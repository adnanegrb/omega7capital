<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research &middot; Omega7 Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #fff; --text: #111; --muted: #999; --border: #e8e8e8; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; font-size: 19px; line-height: 1.65; font-weight: 300; -webkit-font-smoothing: antialiased; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 48px; background: rgba(255,255,255,0.96); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-size: 15px; font-weight: 400; color: var(--text); text-decoration: none; letter-spacing: 0.04em; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 15px; font-weight: 300; color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  main { max-width: 900px; margin: 0 auto; padding: 0 40px; }
  .header { padding-top: 96px; margin-bottom: 56px; opacity: 0; animation: fadeIn 1s ease forwards 0.1s; }
  h1 { font-size: 42px; font-weight: 400; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 12px; }
  .subtitle { font-size: 19px; color: var(--muted); font-weight: 300; }
  .body-text { opacity: 0; animation: fadeIn 1s ease forwards 0.35s; }
  .research-list { margin-top: 40px; }
  .research-item { display: grid; grid-template-columns: 100px 1fr; gap: 40px; padding: 28px 0; border-bottom: 1px solid var(--border); }
  .research-item:last-child { border-bottom: none; }
  .research-date { font-size: 15px; color: var(--muted); font-weight: 400; letter-spacing: 0.02em; padding-top: 2px; }
  .research-content h2 { font-size: 20px; font-weight: 400; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
  .research-content h2 a { color: var(--text); text-decoration: none; transition: opacity 0.15s; }
  .research-content h2 a:hover { opacity: 0.6; }
  .research-meta { font-size: 14px; color: var(--muted); font-weight: 300; }
  footer { margin-top: 80px; padding: 28px 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  footer p { font-size: 13px; color: var(--muted); font-weight: 300; }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 700px) {
    main { padding: 0 20px; }
    nav { padding: 0 20px; }
    .nav-links li:not(:last-child) { display: none; }
    h1 { font-size: 32px; }
    .research-item { grid-template-columns: 1fr; gap: 12px; padding: 20px 0; }
    .research-date { padding-top: 0; }
    footer { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>
<nav>
  <a href="../" class="nav-logo">Omega7 Capital</a>
  <ul class="nav-links">
    <li><a href="../#about">About</a></li>
    <li><a href="index.html#join">Join us</a></li>
  </ul>
</nav>

<main>
  <header class="header">
    <h1>Research</h1>
    <p class="subtitle">Shared science from the collective</p>
  </header>

  <div class="body-text">
    <div class="research-list">
      <div class="research-item">
        <div class="research-date">April 26, 2026</div>
        <div class="research-content">
          <h2><a href="when-random-walks-break.html">When Random Walks Break: Testing Market Efficiency Across 500 Equities</a></h2>
          <p class="research-meta">Omega7 Capital Research Collective</p>
        </div>
      </div>
    </div>


  </div>
</main>

</body>
</html>
