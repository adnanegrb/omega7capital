<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omega7 Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #fff; --text: #111; --muted: #999; --border: #e8e8e8; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 19px; line-height: 1.65; font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 48px;
    background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
  }
  .nav-logo { font-size: 15px; font-weight: 400; color: var(--text); text-decoration: none; letter-spacing: 0.04em; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 15px; font-weight: 300; color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }

  main { max-width: 900px; margin: 0 auto; padding: 0 40px; }

  .hero { padding-top: 56px; padding-bottom: 0px; text-align: center; }
  .hero-logo { width: clamp(253px, 46vw, 483px); height: auto; margin-bottom: 0px; opacity: 0; animation: fadeIn 1s ease forwards 0.1s; filter: opacity(0.65) grayscale(1); margin-top: -60px; margin-bottom: -60px; }
  .badge { margin-top: 32px;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 14px 4px 8px; font-size: 14px; font-weight: 300;
    color: var(--muted); text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
    opacity: 0; animation: fadeIn 1s ease forwards 0.3s;
  }
  .badge:hover { border-color: var(--text); color: var(--text); }
  .badge-tag { background: var(--text); color: #fff; font-size: 10px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; }

  .body-text { opacity: 0; animation: fadeIn 1s ease forwards 0.5s; margin-top: 40px; }

  p { font-size: 19px; font-weight: 300; line-height: 1.65; color: var(--text); margin-bottom: 18px; }
  p:last-child { margin-bottom: 0; }
  p em { font-style: italic; }

  h2 { font-size: 19px; font-weight: 400; color: var(--text); margin-top: 32px; margin-bottom: 0px; }
  h2 em { font-style: italic; }

  /* Research Program Section */
  .research-section {
    margin-top: 64px;
    padding-top: 48px;
  }

  .program-label {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: block;
  }

  .program-title {
    font-size: 26px;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .program-cohort {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
  }

  .program-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-top: 36px;
    border-top: 1px solid var(--border);
  }

  .program-grid-item {
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }

  .program-grid-item:nth-child(odd) {
    padding-right: 32px;
    border-right: 1px solid var(--border);
  }

  .program-grid-item:nth-child(even) {
    padding-left: 32px;
  }

  .grid-label {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  .grid-content {
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.6;
    margin: 0;
  }

  .track-block {
    margin-top: 36px;
    padding: 28px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .track-title {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .track-row {
    display: flex;
    gap: 0;
    margin-bottom: 0;
  }

  .track-item {
    flex: 1;
    padding: 16px 24px 16px 0;
  }

  .track-item + .track-item {
    padding-left: 24px;
    padding-right: 0;
    border-left: 1px solid var(--border);
  }

  .track-level {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .track-desc {
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.6;
    margin: 0;
  }

  .join-link {
    display: inline-block; margin-top: 24px; font-size: 15px; font-weight: 300;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text); text-decoration: none;
    border-bottom: 1px solid var(--text); padding-bottom: 2px;
    transition: opacity 0.2s;
  }
  .join-link:hover { opacity: 0.4; }

  footer { margin-top: 48px; padding: 20px 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  footer p { font-size: 13px; color: var(--muted); font-weight: 300; }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    main { padding: 0 20px; } nav { padding: 0 20px; }
    .nav-links li:not(:last-child) { display: none; }
    footer { flex-direction: column; gap: 6px; }
    .program-grid { grid-template-columns: 1fr; }
    .program-grid-item:nth-child(odd) { padding-right: 0; border-right: none; }
    .program-grid-item:nth-child(even) { padding-left: 0; }
    .track-row { flex-direction: column; }
    .track-item + .track-item { padding-left: 0; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Omega7 Capital</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#join" class="active">Join us</a></li>
  </ul>
</nav>
